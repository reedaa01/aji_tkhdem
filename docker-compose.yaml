services:
    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: unless-stopped
        env_file:
            - .env.production
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - app-network

    backend:
        image: ridadevopsacr2026.azurecr.io/backend:latest
        container_name: backend
        restart: unless-stopped
        ports:
            - "5000:5000"
        env_file:
            - .env.production
        environment:
            - DB_HOST=mysql
            - DB_PORT=3306
            - PORT=5000
            - NODE_ENV=production
        depends_on:
            mysql:
                condition: service_healthy
        volumes:
            - ./backend/uploads:/app/uploads
        networks:
            - app-network

    frontend:
        image: ridadevopsacr2026.azurecr.io/frontend:latest
        container_name: frontend
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            - .env.production
        environment:
            - NODE_ENV=production
        depends_on:
            - backend
        networks:
            - app-network

    node-exporter:
        image: prom/node-exporter:latest
        container_name: node-exporter
        restart: unless-stopped
        pid: host
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro,rslave
        ports:
            - "9100:9100"
        networks:
            - app-network

    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        restart: unless-stopped
        ports:
            - "9090:9090"
        volumes:
            - prometheus_data:/prometheus
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
        command:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
        depends_on:
            - node-exporter
        networks:
            - app-network

    grafana:
        image: grafana/grafana-oss:latest
        container_name: grafana
        restart: unless-stopped
        ports:
            - "3001:3000"
        environment:
            - GF_SECURITY_ADMIN_USER=admin
            - GF_SECURITY_ADMIN_PASSWORD=Admin123!
            - GF_SERVER_ROOT_URL=https://aji-tkhdem.duckdns.org/grafana/
            - GF_SERVER_SERVE_FROM_SUB_PATH=true
        volumes:
            - grafana_data:/var/lib/grafana
        depends_on:
            - prometheus
        networks:
            - app-network

    cadvisor:
        image: gcr.io/cadvisor/cadvisor:latest
        container_name: cadvisor
        restart: unless-stopped
        ports:
            - "8080:8080"
        privileged: true
        devices:
            - /dev/kmsg
        volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker:/var/lib/docker:ro
            - /dev/disk:/dev/disk:ro
        networks:
            - app-network

volumes:
    mysql_data:
    prometheus_data:
    grafana_data:

networks:
    app-network:
        driver: bridge