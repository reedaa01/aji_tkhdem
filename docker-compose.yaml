services:
    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: unless-stopped
        env_file:
            - .env.production
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - app-network

    backend:
        image: ridadevopsacr2026.azurecr.io/backend:latest
        container_name: backend
        restart: unless-stopped
        ports:
            - "5000:5000"
        env_file:
            - .env.production
        environment:
            - DB_HOST=mysql
            - DB_PORT=3306
            - PORT=5000
            - NODE_ENV=production
        depends_on:
            mysql:
                condition: service_healthy
        volumes:
            - ./backend/uploads:/app/uploads
        networks:
            - app-network

    frontend:
        image: ridadevopsacr2026.azurecr.io/frontend:latest
        container_name: frontend
        restart: unless-stopped
        ports:
            - "3000:3000"
        env_file:
            - .env.production
        environment:
            - NODE_ENV=production
        depends_on:
            - backend
        networks:
            - app-network

    node-exporter:
        image: prom/node-exporter:latest
        container_name: node-exporter
        restart: unless-stopped
        pid: host
        command:
            - --path.rootfs=/host
        volumes:
            - /:/host:ro,rslave
        ports:
            - "9100:9100"
        networks:
            - app-network

volumes:
    mysql_data:

networks:
    app-network:
        driver: bridge