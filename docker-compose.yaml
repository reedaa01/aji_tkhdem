services:
    mysql:
        image: mysql:8.0
        container_name: mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: Reda2001@Supmti
            MYSQL_DATABASE: aji_tkhdem
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pReda2001@Supmti"]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 30s
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - app-network

    backend:
        build: ./backend
        container_name: backend
        restart: unless-stopped
        ports:
            - "5000:5000"
        environment:
            - DB_HOST=mysql
            - DB_PORT=3306
            - DB_USER=root
            - DB_PASSWORD=Reda2001@Supmti
            - DB_NAME=aji_tkhdem
            - PORT=5000
            - NODE_ENV=development
        depends_on:
            mysql:
                condition: service_healthy
        volumes:
            - ./backend/uploads:/app/uploads
        networks:
            - app-network

    frontend:
        build: ./frontend
        container_name: frontend
        restart: unless-stopped
        ports:
            - "3000:3000"
        environment:
            - NEXT_PUBLIC_BACKEND_URL=http://backend:5000/api
        depends_on:
            - backend
        networks:
            - app-network

volumes:
    mysql_data:

networks:
    app-network:
        driver: bridge